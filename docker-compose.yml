services:
  hardcover-sync:
    build: .
    restart: unless-stopped
    env_file: .env
    # Chrome needs more shared memory than the Docker default (64 MB)
    shm_size: "256mb"
    # Drop all Linux capabilities; Chrome needs SYS_ADMIN as a sandbox alternative
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    volumes:
      # Mount the cookies folder so the container can use your saved sessions.
      # Run 'python setup_cookies.py' on your local machine first.
      - ./cookies:/app/cookies
      # Named volume so appuser can write sync state regardless of host permissions
      - sync-state:/app/state

volumes:
  sync-state:
