name: Test and publish Docker image

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pip check
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m compileall -q .
      - run: python -m unittest discover -v
      - run: docker compose config --quiet
      - run: docker build -t hardcover-sync:test .
      - name: Verify container entrypoint logs
        run: |
          docker run --rm hardcover-sync:test python -u main.py --help \
            > container.log 2>&1
          cat container.log
          grep -F "[hardcover-sync-entrypoint] container starting" container.log
          grep -F "[hardcover-sync-entrypoint] virtual display is ready" container.log
          grep -F "usage:" container.log

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/hardcover-sync
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
